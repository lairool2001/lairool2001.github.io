<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8515898985858287"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓咪不作戰首頁</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            filter: grayscale(100%) brightness(0.6);
            transition: filter 0.5s ease, flex 0.5s ease;
            cursor: pointer;
        }

        .panel:hover {
            filter: grayscale(0%) brightness(1);
            flex: 1.3;
        }

        /* 作品集 - 深藍漸層 */
        .panel--portfolio {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        /* 知識集成 - 深綠漸層 */
        .panel--knowledge {
            background: linear-gradient(135deg, #134e5e, #71b280, #0a3d2e);
        }

        /* 分隔線 */
        .panel--portfolio::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 2px;
            background: rgba(255,255,255,0.15);
        }

        .panel__icon {
            font-size: 5rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .panel:hover .panel__icon {
            transform: scale(1.15) translateY(-6px);
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.7));
        }

        .panel__title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.25em;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
            transition: letter-spacing 0.4s ease;
        }

        .panel:hover .panel__title {
            letter-spacing: 0.4em;
        }

        .panel__sub {
            margin-top: 0.75rem;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* 底部裝飾線 */
        .panel__line {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 0;
            transition: width 0.5s ease;
        }

        .panel--portfolio .panel__line {
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
        }

        .panel--knowledge .panel__line {
            background: linear-gradient(90deg, #34d399, #6ee7b7);
        }

        .panel:hover .panel__line {
            width: 100%;
        }

        /* 背景粒子光點裝飾 */
        .panel__bg-text {
            position: absolute;
            font-size: 18rem;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            user-select: none;
            pointer-events: none;
            letter-spacing: -0.05em;
        }
    </style>
</head>

<body>
    <a class="panel panel--portfolio" href="https://lairool2001.github.io/work/" target="_blank">
        <span class="panel__bg-text">W</span>
        <i class="fa-solid fa-layer-group panel__icon"></i>
        <div class="panel__title">作品集</div>
        <div class="panel__sub">Portfolio</div>
        <div class="panel__line"></div>
    </a>

    <a class="panel panel--knowledge" href="https://lairool2001.github.io/know/" target="_blank">
        <span class="panel__bg-text">K</span>
        <i class="fa-solid fa-book-open panel__icon"></i>
        <div class="panel__title">知識集成</div>
        <div class="panel__sub">Knowledge Base</div>
        <div class="panel__line"></div>
    </a>
