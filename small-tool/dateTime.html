<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時鐘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
        }

        body {
            background: #0a0e27 url('mochi_subsaub-2065412351210492093-img1.jpg') center top / cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,0.35), transparent),
                radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.25), transparent),
                radial-gradient(2px 2px at 90% 50%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.2), transparent);
            pointer-events: none;
            opacity: 0.8;
        }

        .clock {
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 1rem 2rem;
            transform-origin: center;
            transition: transform 0.2s ease;
        }

        .info-box {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 0.5em;
            font-size: 0.95rem;
            line-height: 1.6;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .date-line {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 0.4em;
            text-shadow: 0 0 30px rgba(140, 180, 255, 0.4);
            white-space: nowrap;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 0.4em;
        }

         #date,.weekday {
            display: inline-block;
            padding: 0.1em 0.6em;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 0.5em;
            font-size: 1.8rem;
            background: linear-gradient(180deg, #fff 30%, #b8d4ff 70%, #8aa9ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 100;
            text-shadow: 0 0 60px rgba(140, 180, 255, 0.6), 0 0 30px rgba(100, 150, 255, 0.4), 0 0 15px rgba(80, 120, 255, 0.3);
            backdrop-filter: blur(10px);
            font-weight: 700;
            
        }

        .time-line {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2em;
            font-weight: 200;
            letter-spacing: 0.02em;
        }

        .period {
            font-size: 3rem;
            color: rgba(255, 200, 240, 0.85);
            font-weight: 300;
            letter-spacing: 0.08em;
            white-space: nowrap;
            padding: 0.2em 0.6em;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 0.5em;
            display: inline-block;
            backdrop-filter: blur(10px);
            text-shadow: 0 0 20px rgba(255, 200, 240, 0.5), 0 0 10px rgba(140, 180, 255, 0.3);
        }

        .time {
            font-size: 12rem;
            font-family: "Segoe UI Light", "Helvetica Neue", system-ui, sans-serif;
            font-weight: 100;
            background: linear-gradient(180deg, #fff 30%, #b8d4ff 70%, #8aa9ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 60px rgba(140, 180, 255, 0.6), 0 0 30px rgba(100, 150, 255, 0.4), 0 0 15px rgba(80, 120, 255, 0.3);
            font-variant-numeric: tabular-nums;
            line-height: 1;
            white-space: nowrap;
            padding: 0.2em 0.6em;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 0.5em;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        .colon {
            animation: blink 1s steps(2, end) infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .seconds {
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.5);
            font-variant-numeric: tabular-nums;
            margin-top: 0.4em;
            letter-spacing: 0.25em;
            padding: 0.3em 0.6em;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 0.5em;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        .hint {
            position: fixed;
            bottom: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.2em;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        body.idle .hint {
            opacity: 0;
        }

        body:fullscreen, body:-webkit-full-screen {
            background-color: #0a0e27;
        }

        @media (max-width: 600px) {
            .date-line { letter-spacing: 0.08em; }
            .time-line { gap: 0.2em; }
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="info-box" id="info"></div>
        <div class="date-line">
            <span id="date">----年--月--日</span>
            <span class="weekday" id="weekday">星期-</span>
        </div>
        <div class="time-line">
            <span class="period" id="period">上午</span>
            <span class="time">
                <span id="hour">--</span><span class="colon">:</span><span id="minute">--</span>
            </span>
        </div>
        <div class="seconds" id="seconds">-- 秒</div>
    </div>
    <div class="hint">點一下切換全螢幕</div>

    <script>
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        const pad = n => String(n).padStart(2, '0');
        let wakeLock = null;

        async function loadInfo() {
            try {
                const response = await fetch('https://bgw.neocities.org/info.txt');
                const text = await response.text();
                document.getElementById('info').textContent = text;
            } catch (err) {
                document.getElementById('info').textContent = '無法載入資訊';
                console.error('載入失敗:', err);
            }
        }

        loadInfo();

        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.log('Wake Lock 請求失敗:', err.name, err.message);
            }
        }

        if ('wakeLock' in navigator) {
            requestWakeLock();
            document.addEventListener('visibilitychange', async () => {
                if (document.hidden && wakeLock !== null) {
                    wakeLock = null;
                } else if (!document.hidden) {
                    requestWakeLock();
                }
            });
        }

        function update() {
            const d = new Date();
            const y = d.getFullYear();
            const m = pad(d.getMonth() + 1);
            const day = pad(d.getDate());
            const wd = weekdays[d.getDay()];
            const h24 = d.getHours();
            const period = h24 < 12 ? '上午' : '下午';
            const h12 = h24 % 12 === 0 ? 12 : h24 % 12;

            document.getElementById('date').textContent = `${y}年${m}月${day}日`;
            document.getElementById('weekday').textContent = `星期${wd}`;
            document.getElementById('period').textContent = period;
            document.getElementById('hour').textContent = pad(h12);
            document.getElementById('minute').textContent = pad(d.getMinutes());
            document.getElementById('seconds').textContent = `${pad(d.getSeconds())} 秒`;

            document.title = `${period} ${pad(h12)}:${pad(d.getMinutes())}`;
        }

        update();
        setInterval(update, 1000);

        function toggleFullscreen() {
            const el = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        }

        document.body.addEventListener('click', toggleFullscreen);

        const clock = document.querySelector('.clock');
        function fitToScreen() {
            clock.style.transform = 'scale(1)';
            const rect = clock.getBoundingClientRect();
            const scale = Math.min(
                window.innerWidth / rect.width,
                window.innerHeight / rect.height
            ) * 0.92;
            clock.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', fitToScreen);
        window.addEventListener('load', fitToScreen);
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(fitToScreen);
        }
        requestAnimationFrame(fitToScreen);

        let idleTimer;
        function resetIdle() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => document.body.classList.add('idle'), 3000);
        }
        document.addEventListener('mousemove', resetIdle);
        document.addEventListener('touchstart', resetIdle);
        resetIdle();
    </script>
</body>
</html>
